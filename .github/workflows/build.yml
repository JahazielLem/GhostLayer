name: Build

on:
  push:
    branches: [ "main", "refactor" ]
    tags:
      - "v*.*.*"
jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    env:
      BUILD_DIR: build
      DIST_DIR: dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            pkg-config \
            libgtk-3-dev \
            git

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install gtk+3 cmake pkg-config

      - name: Configure
        run: |
          cmake -B $BUILD_DIR -S . \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            CORES=$(sysctl -n hw.ncpu)
          else
            CORES=$(nproc)
          fi

          cmake --build $BUILD_DIR -- -j$CORES

      - name: Strip binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          strip $BUILD_DIR/ghostlayer || true

      - name: Package
        run: |
          mkdir -p $DIST_DIR

          VERSION=$(git describe --tags --always || echo "dev")

          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp $BUILD_DIR/ghostlayer $DIST_DIR/ghostlayer-macos-$VERSION
          else
            cp $BUILD_DIR/ghostlayer $DIST_DIR/ghostlayer-linux-$VERSION
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostlayer-${{ matrix.os }}
          path: dist/*