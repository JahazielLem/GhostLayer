name: Build

on:
  push:
    branches: [ "main", "refactor" ]
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os}}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            pkg-config \
            libgtk-3-dev \
            git

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install gtk+3 cmake pkg-config

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build -j$(nproc || sysctl -n hw.ncpu)

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          strip build/ghostlayer || true

      - name: Package
        run: |
          mkdir dist
          cp build/ghostlayer dist/ghostlayer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostlayer-${{ matrix.os }}
          path: dist/ghostlayer